name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # -- Lint 
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-lint-${{ hashFiles('requirements.txt') }}

      - name: Install lint tools
        run: pip install black isort

      - name: black
        run: black src/ tests/ --check

      - name: isort
        run: isort src/ tests/ --check-only

  # -- Test 
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      matrix:
        python-version: ["3.11"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ matrix.python-version }}-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Create artifact directories
        run: |
          mkdir -p artifacts/models artifacts/metrics artifacts/shap \
                   artifacts/logs artifacts/scores \
                   data/raw data/processed data/interim data/samples \
                   reports/figures

      - name: Run tests
        run: pytest tests/ -v --tb=short --cov=src --cov-report=xml --cov-report=term-missing

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        if: always()
        with:
          file: ./coverage.xml
          fail_ci_if_error: false

  # -- Docker build check 
  docker:
    name: Docker build
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t risk-scoring-system:ci .

      - name: Check image starts
        run: |
          mkdir -p artifacts/models artifacts/metrics artifacts/shap artifacts/logs
          docker run --rm -d \
            -p 8000:8000 \
            --name rss-ci \
            -v ${{ github.workspace }}/artifacts:/app/artifacts:ro \
            risk-scoring-system:ci
          sleep 8
          curl --fail http://localhost:8000/health || (docker logs rss-ci && exit 1)
          docker stop rss-ci
